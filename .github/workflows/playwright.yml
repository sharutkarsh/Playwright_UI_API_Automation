name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chromium
            project: chromium
            install: chromium
          - browser: firefox
            project: firefox
            install: firefox
          - browser: webkit
            project: webkit
            install: webkit
          - browser: edge
            project: edge
            install: chromium

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install ${{ matrix.install }} chromium --with-deps

      - name: Run UI tests on ${{ matrix.browser }}
        run: npx playwright test --project=${{ matrix.project }}
        env:
          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}

      - name: Run API tests (chromium only)
        if: matrix.browser == 'chromium'
        run: npx playwright test --project=api
        env:
          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}

      - name: Upload HTML report (${{ matrix.browser }})
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: reports/html/
          retention-days: 14

      - name: Upload test results (${{ matrix.browser }})
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-${{ matrix.browser }}
          path: test-results/
          retention-days: 14

      - name: Upload Allure results (${{ matrix.browser }})
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ matrix.browser }}
          path: reports/allure-results/
          retention-days: 14
